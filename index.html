<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="morabyfit_client">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>morabyfit_client</title>
  <link rel="manifest" href="manifest.json">

  <!-- Simple pre-Flutter splash to avoid white screen -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #050712; /* match app background */
      color: #ffffff;
    }

    #flutter-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.45) 0, transparent 55%),
        radial-gradient(circle at bottom right, rgba(14, 148, 136, 0.42) 0, transparent 55%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.9) 0, #020617 60%);
      z-index: 9999;
    }

    #flutter-loader-logo {
      width: 110px;
      height: 110px;
      border-radius: 30px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.95));
      box-shadow:
        0 22px 70px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(15, 23, 42, 0.8),
        0 0 40px rgba(56, 189, 248, 0.45);
      backdrop-filter: blur(18px);
    }

    #flutter-loader-text {
      margin-top: 4px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.78;
      color: rgba(226, 232, 240, 0.96);
    }

    #flutter-loader-dots {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      width: 24px;
      margin-left: 2px;
      gap: 1px;
    }

    #flutter-loader-dots span {
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.85);
      opacity: 0.15;
      transform: translateY(0);
      animation: flutter-loader-dots 900ms ease-in-out infinite;
    }

    #flutter-loader-dots span:nth-child(2) {
      animation-delay: 140ms;
    }

    #flutter-loader-dots span:nth-child(3) {
      animation-delay: 280ms;
    }

    #flutter-loader-progress-wrap {
      width: 230px;
      margin-top: 10px;
    }

    #flutter-loader-progress-track {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.6));
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.9);
    }

    #flutter-loader-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22c55e, #38bdf8, #0ea5e9);
      background-size: 200% 100%;
      transition: width 0.25s ease-out;
      animation: flutter-loader-bar 1.15s ease-in-out infinite;
    }

    #flutter-loader-percent {
      font-size: 12px;
      letter-spacing: 0.08em;
      opacity: 0.9;
      margin-top: 7px;
      text-align: center;
      color: rgba(148, 163, 184, 0.98);
    }

    @keyframes flutter-loader-bar {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes flutter-loader-dots {
      0% {
        opacity: 0.15;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-2px);
      }
      60% {
        opacity: 0.7;
        transform: translateY(0);
      }
      100% {
        opacity: 0.15;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <!-- Shows immediately while Flutter JS loads -->
  <div id="flutter-loader">
    <div id="flutter-loader-logo">
      <img src="icons/Icon-192.png" alt="MorabyFit logo" style="width: 72px; height: 72px; border-radius: 20px; object-fit: cover;" />
    </div>
    <div id="flutter-loader-text">
      Installing MorabyFit
      <span id="flutter-loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </div>
    <div id="flutter-loader-progress-wrap">
      <div id="flutter-loader-progress-track">
        <div id="flutter-loader-progress-fill"></div>
      </div>
      <div id="flutter-loader-percent">0%</div>
    </div>
  </div>

  <script>
    (function () {
      var fill = document.getElementById('flutter-loader-progress-fill');
      var percentEl = document.getElementById('flutter-loader-percent');
      var progress = 0;
      var maxSimulated = 88;

      var interval = setInterval(function () {
        if (progress >= maxSimulated) {
          clearInterval(interval);
          return;
        }
        progress += 2 + Math.random() * 4;
        if (progress > maxSimulated) progress = maxSimulated;
        fill.style.width = progress + '%';
        percentEl.textContent = Math.round(progress) + '%';
      }, 180);
      window.addEventListener('flutter-first-frame', function () {
        clearInterval(interval);
        progress = 100;
        fill.style.width = '100%';
        percentEl.textContent = '100%';
        var loader = document.getElementById('flutter-loader');
        if (loader && loader.parentNode) {
          setTimeout(function () {
            loader.parentNode.removeChild(loader);
          }, 120);
        }
      });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
